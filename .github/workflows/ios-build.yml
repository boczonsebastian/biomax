name: Build and Submit iOS App

on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build web app
        run: CI=false npm run build
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Install Apple Certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
        run: |
          echo $CERTIFICATES_P12 | base64 --decode > certificate.p12
          security create-keychain -p biomax123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p biomax123 build.keychain
          security import certificate.p12 -k build.keychain -P $CERTIFICATES_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k biomax123 build.keychain
      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/biomax.mobileprovision
      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -archivePath App.xcarchive archive
      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ../../ExportOptions.plist -exportPath ./build
      - name: Upload to App Store
        env:
          APP_STORE_CONNECT_USERNAME: ${{ secrets.ASC_USERNAME }}
          APP_STORE_CONNECT_PASSWORD: ${{ secrets.ASC_PASSWORD }}
        run: |
          xcrun altool --upload-app -f ios/App/build/*.ipa -u $APP_STORE_CONNECT_USERNAME -p $APP_STORE_CONNECT_PASSWORD
