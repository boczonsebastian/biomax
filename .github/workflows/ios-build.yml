name: Build and Submit iOS App

on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build web app
        run: CI=false npm run build
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Install Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}
      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf '%s' "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/biomax.mobileprovision
      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -archivePath App.xcarchive archive
      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ../../ExportOptions.plist -exportPath ./build
      - name: Upload to App Store
        env:
          ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
          ASC_PASSWORD: ${{ secrets.ASC_PASSWORD }}
        run: |
          xcrun altool --upload-app -f ios/App/build/*.ipa -u "$ASC_USERNAME" -p "$ASC_PASSWORD" --type ios
