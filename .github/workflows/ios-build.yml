name: Build iOS App

on:
  push:
    branches: [master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build web app
        run: CI=false npm run build
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Resolve SPM dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -archivePath App.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO ALLOW_TARGET_PLATFORM_SPECIALIZATION=YES
